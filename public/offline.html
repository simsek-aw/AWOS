<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AWOS — offline</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: system-ui, sans-serif;
        background: #0f1117;
        color: #e6e8ee;
        text-align: center;
        padding: 24px;
      }
      .card {
        max-width: 360px;
      }
      button {
        margin-top: 16px;
        background: #4b7bec;
        color: #fff;
        border: none;
        border-radius: 8px;
        padding: 9px 18px;
        font-weight: 600;
        font-size: 14px;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Offline</h1>
      <p style="color: #9aa1b1">
        AWOS ist gerade nicht erreichbar. Prüfe deine Verbindung und versuche es
        erneut.
      </p>
      <button onclick="location.reload()">Neu laden</button>
    </div>
  </body>
</html>
